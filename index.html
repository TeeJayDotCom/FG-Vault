<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FG Vault | Ultra Premium</title>
    
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* === ULTRA PREMIUM AMOLED THEME === */
        :root {
            --bg-amoled: #050505;
            --surface-card: #121212;
            --border-glow: #2A2A2A;
            
            /* Required Status Colors */
            --status-obsolete: #FF4500; /* Dark Bright Orange */
            --status-in-use: #00E676;   /* Dark Bright Green */
            
            --curve: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-amoled);
            color: #ffffff;
            min-height: 101vh; 
            padding-bottom: 120px;
            -webkit-font-smoothing: antialiased;
        }

        /* === STICKY HEADER & SEARCH === */
        .glass-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            padding: 20px 20px 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .search-wrapper {
            position: relative;
            background: #1A1A1A;
            border: 1px solid #333;
            border-radius: 16px;
            display: flex; align-items: center;
            padding: 4px 6px;
            transition: all 0.3s var(--curve);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        .search-wrapper:focus-within {
            border-color: #00E676;
            box-shadow: 0 0 0 4px rgba(0, 230, 118, 0.1);
            background: #222;
        }
        
        .search-input {
            background: transparent; border: none; color: white; width: 100%;
            padding: 12px 10px 12px 42px; font-size: 16px; outline: none; font-weight: 500;
        }
        .search-icon { position: absolute; left: 16px; color: #777; font-size: 18px; transition: 0.3s; }
        .search-wrapper:focus-within .search-icon { color: #00E676; }

        .search-badge {
            background: rgba(255,255,255,0.1); color: #FFF;
            font-size: 12px; font-weight: 800;
            padding: 6px 12px; border-radius: 12px;
            margin-right: 6px; white-space: nowrap;
        }

        /* === PREMIUM LIST CARDS === */
        .premium-card {
            background: var(--surface-card);
            border: 1px solid var(--border-glow);
            border-radius: 20px; margin-bottom: 16px; padding: 16px;
            cursor: pointer; transition: all 0.2s var(--curve);
            display: flex; align-items: stretch; gap: 16px;
            position: relative; overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .premium-card:active { transform: scale(0.96); background: #181818; }
        
        /* The colored left accent line */
        .status-accent {
            position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
        }

        .icon-box {
            width: 54px; height: 54px; border-radius: 14px; flex-shrink: 0;
            background: linear-gradient(135deg, #222, #111);
            border: 1px solid #333; display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: #888;
        }

        .card-content { flex: 1; min-w: 0; display: flex; flex-direction: column; justify-content: center; }
        
        .item-name {
            font-size: 16px; font-weight: 700; color: #FFFFFF;
            line-height: 1.3; margin-bottom: 8px;
            word-wrap: break-word; white-space: normal; /* Fixed Truncation */
        }

        .tag {
            font-family: 'Courier New', Courier, monospace; font-size: 12px; font-weight: 800;
            padding: 4px 8px; border-radius: 6px; background: #222; color: #AAA; border: 1px solid #333;
        }

        /* === FLOATING MODAL (Upgraded from Bottom Sheet) === */
        .modal-backdrop {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 900;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-backdrop.show { opacity: 1; pointer-events: auto; }

        .floating-modal {
            position: fixed; bottom: 16px; left: 16px; right: 16px; z-index: 1000;
            background: #141414; border: 1px solid #333; border-radius: 28px;
            transform: translateY(120%); transition: transform 0.4s var(--curve);
            max-height: 85vh; display: flex; flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        .floating-modal.show { transform: translateY(0); }

        .modal-header {
            padding: 20px 24px; border-bottom: 1px solid #222;
            display: flex; justify-content: space-between; align-items: flex-start; gap: 16px;
            background: linear-gradient(to bottom, #1A1A1A, #141414);
            border-top-left-radius: 28px; border-top-right-radius: 28px;
        }

        .close-btn {
            width: 36px; height: 36px; border-radius: 18px; flex-shrink: 0;
            background: #2A2A2A; color: #FFF; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 16px;
            transition: 0.2s;
        }
        .close-btn:active { transform: scale(0.9); background: #444; }

        .spec-grid {
            background: #0A0A0A; border-radius: 20px; padding: 16px; margin-bottom: 20px;
            border: 1px solid #222;
        }
        .spec-row {
            display: flex; justify-content: space-between; padding: 12px 0;
            border-bottom: 1px dashed #222; align-items: center;
        }
        .spec-row:last-child { border-bottom: none; padding-bottom: 0; }
        .spec-label { color: #888; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .spec-value { color: #FFF; font-size: 15px; font-weight: 700; text-align: right; max-width: 60%; word-wrap: break-word;}

        /* === NATIVE SHARE BUTTON (Glowing Green) === */
        .share-btn {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            color: #FFF; border: none; padding: 18px; border-radius: 20px;
            font-size: 17px; font-weight: 800; width: 100%; 
            display: flex; justify-content: center; align-items: center; gap: 10px;
            box-shadow: 0 8px 25px rgba(0, 176, 155, 0.4); transition: 0.2s; cursor: pointer;
        }
        .share-btn:active { transform: scale(0.96); box-shadow: 0 4px 15px rgba(0, 176, 155, 0.3); }

        /* === SCROLL FABS === */
        .fab-container { position: fixed; bottom: 24px; right: 20px; z-index: 800; display: flex; flex-direction: column; gap: 12px; }
        .fab {
            width: 48px; height: 48px; border-radius: 24px;
            background: rgba(30, 30, 30, 0.9); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); color: #FFF;
            display: flex; align-items: center; justify-content: center; font-size: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6); cursor: pointer; transition: 0.2s;
        }
        .fab:active { transform: scale(0.9); background: #FFF; color: #000; }
    </style>
</head>
<body>

    <div class="glass-header">
        <div class="flex justify-between items-center mb-5">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tight">FG Vault</h1>
                <p id="statusIndicator" class="text-xs text-gray-500 font-bold uppercase tracking-widest mt-1">Connecting Database...</p>
            </div>
            <div class="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center border border-white/5 shadow-inner">
                <i class="fas fa-boxes-stacked text-xl text-gray-300"></i>
            </div>
        </div>
        
        <div class="search-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Search item, code, vendor..." autocomplete="off">
            <div id="searchBadge" class="search-badge hidden">0 Items</div>
        </div>
    </div>

    <div id="mainContent" class="p-4">
        
        <div id="welcomeState" class="flex flex-col items-center justify-center py-24 text-center">
            <div class="w-20 h-20 bg-gradient-to-br from-gray-800 to-gray-900 rounded-full flex items-center justify-center mb-6 border border-gray-700 shadow-2xl">
                <i class="fas fa-bolt text-3xl text-gray-400"></i>
            </div>
            <h3 class="text-xl font-bold text-white mb-2">Vault is Online</h3>
            <p class="text-sm text-gray-500 max-w-[250px]">Start typing in the search bar to instantly pull records.</p>
        </div>

        <div id="listContainer" class="hidden"></div>
    </div>

    <div class="fab-container">
        <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="fab"><i class="fas fa-arrow-up"></i></button>
        <button onclick="window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'})" class="fab"><i class="fas fa-arrow-down"></i></button>
    </div>

    <div id="modalBackdrop" class="modal-backdrop" onclick="app.closeModal()"></div>
    <div id="detailModal" class="floating-modal">
        
        <div class="modal-header">
            <div class="flex-1 pr-2">
                <span id="mStatusBadge" class="text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded mb-3 inline-block"></span>
                <h2 id="mName" class="text-xl font-bold text-white leading-snug break-words whitespace-normal mb-3"></h2>
                <div class="flex items-center gap-2">
                    <span id="mCode" class="tag"></span>
                    <span id="mOldCode" class="text-gray-500 font-mono text-xs font-bold"></span>
                </div>
            </div>
            <button onclick="app.closeModal()" class="close-btn">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-5 pb-6">
            
            <h4 class="text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-2 pl-1">Technical Specs</h4>
            <div class="spec-grid">
                <div class="spec-row"><span class="spec-label">Shape</span><span id="mShape" class="spec-value"></span></div>
                <div class="spec-row bg-blue-900/10 -mx-4 px-4 py-3"><span class="spec-label text-blue-400">Body Dia Major</span><span id="mDia" class="spec-value text-blue-400"></span></div>
                <div class="spec-row"><span class="spec-label">Total Height</span><span id="mHeight" class="spec-value"></span></div>
                <div class="spec-row"><span class="spec-label">Weight</span><span id="mWeight" class="spec-value"></span></div>
                <div class="spec-row"><span class="spec-label">OFC</span><span id="mOfc" class="spec-value"></span></div>
            </div>

            <h4 class="text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-2 pl-1 mt-2">Packaging Matrix</h4>
            <div class="spec-grid mb-6">
                <div class="spec-row"><span class="spec-label">Direction</span><span id="mDir" class="spec-value text-sm text-gray-300"></span></div>
                <div class="spec-row"><span class="spec-label">CB Size</span><span id="mCBSize" class="spec-value text-sm text-gray-300"></span></div>
                <div class="spec-row"><span class="spec-label">Pouch Size</span><span id="mPouchSize" class="spec-value text-sm text-gray-300"></span></div>
                <div class="spec-row"><span class="spec-label">Matrix/Tray</span><span id="mMatrix" class="spec-value text-sm text-gray-300"></span></div>
                <div class="spec-row"><span class="spec-label">Total Pouch</span><span id="mTotalPouch" class="spec-value"></span></div>
                <div class="spec-row"><span class="spec-label font-bold text-white">Total Pcs</span><span id="mTotalPcs" class="text-xl font-black text-white"></span></div>
            </div>

            <button class="share-btn" onclick="app.nativeShare()">
                <i class="fas fa-share-nodes text-xl"></i> Share Item Details
            </button>

        </div>
    </div>

    <script>
        const CONFIG = {
            FILE_NAME: "FGVAULT.xlsx" 
        };

        class PremiumInventory {
            constructor() {
                this.db = [];
                this.debounceTimer = null;
                this.selectedItem = null;

                this.ui = {
                    search: document.getElementById('searchInput'),
                    searchBadge: document.getElementById('searchBadge'),
                    statusIndicator: document.getElementById('statusIndicator'),
                    welcome: document.getElementById('welcomeState'),
                    list: document.getElementById('listContainer'),
                    modal: document.getElementById('detailModal'),
                    backdrop: document.getElementById('modalBackdrop')
                };

                this.init();
            }

            init() {
                this.ui.search.addEventListener('input', (e) => {
                    clearTimeout(this.debounceTimer);
                    this.debounceTimer = setTimeout(() => this.searchData(e.target.value), 100);
                });

                this.loadData();
            }

            // Determines Status Colors Exactly as Requested
            parseStatus(rawStatus) {
                const statusStr = String(rawStatus || "").trim().toUpperCase();
                const isObsolete = statusStr === 'OBSOLETE';
                
                return {
                    text: isObsolete ? 'OBSOLETE' : 'IN USE',
                    color: isObsolete ? 'var(--status-obsolete)' : 'var(--status-in-use)',
                    bg: isObsolete ? 'rgba(255, 69, 0, 0.15)' : 'rgba(0, 230, 118, 0.15)'
                };
            }

            // Determines Icon based on name
            getIcon(name) {
                const n = name.toUpperCase();
                if (n.includes("CAP") || n.includes("SCREW") || n.includes("CLOSURE")) return "fa-ring"; 
                if (n.includes("JAR")) return "fa-prescription-bottle"; 
                if (n.includes("BOTTLE") || n.includes("PET")) return "fa-wine-bottle"; 
                if (n.includes("PUMP") || n.includes("SPRAY")) return "fa-spray-can";
                return "fa-box"; 
            }

            async loadData() {
                try {
                    const response = await fetch(encodeURI(CONFIG.FILE_NAME) + '?t=' + Date.now());
                    if (!response.ok) throw new Error("File Missing");

                    const buffer = await response.arrayBuffer();
                    const workbook = XLSX.read(buffer);
                    const rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });

                    this.db = rawData.map((row, index) => {
                        const statusData = this.parseStatus(row["STATUS"]);
                        const name = String(row["Item Name"] || "Unknown").trim();
                        
                        return {
                            id: index,
                            statusText: statusData.text,
                            statusColor: statusData.color,
                            statusBg: statusData.bg,
                            icon: this.getIcon(name),
                            shape: String(row["Technical DataSheet::Product Shape"] || "-").trim(),
                            oldCode: String(row["Old Item Code"] || "").trim(),
                            code: String(row["Item Code"] || "N/A").trim(),
                            name: name,
                            dir: String(row["List of Matrix::Packing Direction of Bottles"] || "-").trim(),
                            height: String(row["Technical DataSheet::Total Height"] || "-").trim(),
                            weight: String(row["Technical DataSheet::Weight"] || "-").trim(),
                            ofc: String(row["Technical DataSheet::OFC"] || "-").trim(),
                            cbSize: String(row["Corrugated Box Size"] || "-").trim(),
                            pouchSize: String(row["Pouch Size"] || "-").trim(),
                            matrix: String(row["List of Matrix::Packing Matrix per Tray"] || "-").trim(),
                            totalPouch: String(row["List of Matrix::Total Pouch Used"] || "0").trim(),
                            totalPcs: String(row["List of Matrix::Total Pcs"] || "0").trim(),
                            dia: String(row["Technical DataSheet::Body Dia Major"] || "-").trim()
                        };
                    });

                    this.ui.statusIndicator.innerText = `DATABASE SYNCED`;
                    this.ui.statusIndicator.classList.replace("text-gray-500", "text-green-500");

                } catch (error) {
                    this.ui.statusIndicator.innerText = "DATABASE ERROR";
                    this.ui.statusIndicator.classList.replace("text-gray-500", "text-red-500");
                    console.error(error);
                }
            }

            searchData(query) {
                const term = query.toUpperCase().trim();
                
                if (!term) {
                    this.ui.list.classList.add('hidden');
                    this.ui.welcome.classList.remove('hidden');
                    this.ui.welcome.innerHTML = `
                        <div class="w-20 h-20 bg-gradient-to-br from-gray-800 to-gray-900 rounded-full flex items-center justify-center mb-6 border border-gray-700 shadow-2xl">
                            <i class="fas fa-bolt text-3xl text-gray-400"></i>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-2">Vault is Online</h3>
                        <p class="text-sm text-gray-500 max-w-[250px]">Start typing in the search bar to instantly pull records.</p>
                    `;
                    this.ui.searchBadge.classList.add('hidden');
                    return;
                }

                this.ui.welcome.classList.add('hidden');
                this.ui.list.classList.remove('hidden');

                const terms = term.split(" ").filter(t => t);
                const results = this.db.filter(item => {
                    const searchableBlob = `${item.name} ${item.code} ${item.oldCode}`.toUpperCase();
                    return terms.every(t => searchableBlob.includes(t));
                });

                // Update dynamic badge
                this.ui.searchBadge.innerText = `${results.length} Found`;
                this.ui.searchBadge.classList.remove('hidden');

                if (results.length === 0) {
                    this.ui.list.innerHTML = '';
                    this.ui.list.classList.add('hidden');
                    this.ui.welcome.classList.remove('hidden');
                    this.ui.welcome.innerHTML = `
                        <div class="w-20 h-20 bg-[#121212] border border-[#2A2A2A] rounded-full flex items-center justify-center mb-6">
                            <i class="fas fa-ghost text-3xl text-gray-600"></i>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-2">No Records Found</h3>
                        <p class="text-sm text-gray-500">Check spelling or code.</p>
                    `;
                } else {
                    this.renderList(results); 
                }
            }

            renderList(items) {
                const fragment = document.createDocumentFragment();
                this.ui.list.innerHTML = '';

                const renderLimit = items.slice(0, 100);

                renderLimit.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'premium-card';
                    card.onclick = () => this.openModal(item);

                    card.innerHTML = `
                        <div class="status-accent" style="background: ${item.statusColor}"></div>
                        <div class="icon-box"><i class="fas ${item.icon}"></i></div>
                        <div class="card-content">
                            <h3 class="item-name">${item.name}</h3>
                            <div class="flex items-center gap-2 flex-wrap">
                                <span class="tag">${item.code}</span>
                                <span style="color: ${item.statusColor}; font-size: 10px; font-weight: 800; letter-spacing: 0.5px;">• ${item.statusText}</span>
                            </div>
                        </div>
                        <div class="flex flex-col justify-center items-end pl-3">
                            <span class="text-2xl font-black text-white">${item.totalPcs}</span>
                            <span class="text-[9px] uppercase tracking-widest text-gray-500 font-bold mt-1">Total Pcs</span>
                        </div>
                    `;
                    fragment.appendChild(card);
                });

                this.ui.list.appendChild(fragment);
            }

            setSafeText(elementId, value) {
                const element = document.getElementById(elementId);
                if (element) element.innerText = value;
            }

            openModal(item) {
                this.selectedItem = item;
                
                // Status Badge in Header
                const badge = document.getElementById('mStatusBadge');
                badge.innerText = item.statusText;
                badge.style.color = item.statusColor;
                badge.style.backgroundColor = item.statusBg;

                this.setSafeText('mName', item.name);
                this.setSafeText('mCode', item.code);
                this.setSafeText('mOldCode', item.oldCode ? `(Old: ${item.oldCode})` : "");
                
                this.setSafeText('mShape', item.shape);
                this.setSafeText('mHeight', item.height);
                this.setSafeText('mWeight', item.weight);
                this.setSafeText('mOfc', item.ofc);
                this.setSafeText('mDia', item.dia); 

                this.setSafeText('mDir', item.dir);
                this.setSafeText('mCBSize', item.cbSize);
                this.setSafeText('mPouchSize', item.pouchSize);
                this.setSafeText('mMatrix', item.matrix);
                this.setSafeText('mTotalPouch', item.totalPouch);
                this.setSafeText('mTotalPcs', item.totalPcs);

                this.ui.backdrop.classList.add('show');
                this.ui.modal.classList.add('show');
                document.body.style.overflow = 'hidden'; 
            }

            closeModal() {
                this.ui.modal.classList.remove('show');
                this.ui.backdrop.classList.remove('show');
                document.body.style.overflow = '';
                this.selectedItem = null;
            }

            generateExportText() {
                const i = this.selectedItem;
                if (!i) return "";
                return `📦 *${i.name}*\n🆔 Code: ${i.code}\n🟢 Status: ${i.statusText}\n\n📊 *Technical Data:*\n• Body Dia: ${i.dia}\n• Shape: ${i.shape}\n• Height: ${i.height}\n• Weight: ${i.weight}\n• OFC: ${i.ofc}\n\n📦 *Packaging Matrix:*\n• Total Pcs: ${i.totalPcs}\n• Matrix: ${i.matrix}\n• Direction: ${i.dir}\n• CB Size: ${i.cbSize}\n• Pouch Size: ${i.pouchSize}\n• Total Pouch: ${i.totalPouch}`;
            }

            // Uses Native OS Share Sheet (Email, WhatsApp, Messages, etc)
            nativeShare() {
                const text = this.generateExportText();
                
                if (navigator.share) {
                    navigator.share({
                        title: 'Inventory Details',
                        text: text
                    }).catch(console.error);
                } else {
                    // Fallback if browser doesn't support native share
                    navigator.clipboard.writeText(text);
                    alert("Details copied to clipboard! (Native share not supported on this browser)");
                }
            }
        }

        const app = new PremiumInventory();
    </script>
</body>
</html>
